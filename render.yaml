# Render Blueprint: один веб-сервіс (Docker), free tier (без диска)
# SQLite у файловій системі контейнера — дані скидаються при redeploy; SEED_ON_STARTUP відновлює демо.
# Деплой: https://render.com/docs/blueprint-spec — підключити репо → New Blueprint

services:
  - type: web
    name: status-check
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SERVE_FRONTEND
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SEED_ON_STARTUP
        value: "true"
      - key: DATABASE_URL
        value: sqlite:///./status_check.db
      - key: SECRET_KEY
        generateValue: true
